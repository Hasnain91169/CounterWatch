<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OW Counter-Pick</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">OW</div>
          <div>
            <h1>Counter-Pick</h1>
            <p id="saveState">Local app</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="ghost-button" id="resetSetup" type="button">Reset</button>
          <button class="primary-button" id="recommendNow" type="button">Build Team</button>
          <button class="icon-button" id="openSettings" type="button" aria-label="Open settings">Settings</button>
        </div>
      </header>

      <main class="workspace">
        <section class="setup-pane">
          <div class="setup-grid">
            <div class="team-block enemy-block">
              <div class="section-title">
                <h2>Enemy Team</h2>
                <div class="count-pill" id="enemyCount">0/5</div>
              </div>
              <div class="slot-grid enemy-slots" id="enemySlots"></div>
            </div>

            <div class="team-block ally-block">
              <div class="section-title">
                <h2>Your Team</h2>
                <div class="count-pill" id="teamCount">0/5</div>
              </div>
              <div class="slot-grid team-slots" id="teamSlots"></div>
            </div>
          </div>

          <div class="control-row">
            <div class="control-group grow">
              <label class="label" for="heroSearch">Hero</label>
              <input id="heroSearch" type="search" autocomplete="off" placeholder="Search">
            </div>
            <div class="control-group">
              <span class="label">Showing</span>
              <div class="segmented" id="gridRoleFilter">
                <button type="button" data-role="tank">Tank</button>
                <button type="button" data-role="dps">DPS</button>
                <button type="button" data-role="support">Support</button>
              </div>
            </div>
          </div>

          <div class="active-target" id="activeTarget"></div>
          <div class="hero-grid" id="heroGrid"></div>
        </section>

        <section class="results-pane">
          <div class="section-title">
            <h2>Full Stack</h2>
            <div class="status-pill" id="apiStatus">Loading</div>
          </div>
          <div class="warnings" id="warnings"></div>
          <div class="results-list" id="resultsList"></div>
        </section>
      </main>
    </div>

    <aside class="settings-drawer" id="settingsDrawer" aria-hidden="true">
      <div class="drawer-panel">
        <div class="drawer-header">
          <div>
            <h2>Settings</h2>
            <p>Preferences and scoring</p>
          </div>
          <button class="icon-button" id="closeSettings" type="button" aria-label="Close settings">Close</button>
        </div>

        <div class="drawer-section">
          <h3>Score Weights</h3>
          <div class="settings-grid" id="scoreWeights"></div>
        </div>

        <div class="drawer-section">
          <h3>Role Weights</h3>
          <div class="settings-grid" id="roleWeights"></div>
        </div>

        <div class="drawer-section">
          <h3>Carry</h3>
          <label class="number-field">
            <span>Multiplier</span>
            <input id="carryMultiplier" type="number" min="0" max="10" step="0.1">
          </label>
        </div>

        <div class="drawer-actions">
          <button class="primary-button" id="saveConfig" type="button">Save Scoring</button>
          <span class="save-message" id="configSaveMessage"></span>
        </div>

        <div class="drawer-section">
          <div class="section-title compact">
            <h3>Heroes</h3>
            <input id="settingsHeroSearch" type="search" autocomplete="off" placeholder="Search">
          </div>
          <div class="disabled-note" id="preferenceDisabledNote">Personal preferences are temporarily disabled for recommendations.</div>
          <div class="preference-list" id="preferenceList"></div>
        </div>

        <div class="drawer-actions">
          <button class="primary-button" id="savePreferences" type="button">Save Preferences</button>
          <span class="save-message" id="prefSaveMessage"></span>
        </div>
      </div>
    </aside>

    <script src="/app.js"></script>
  </body>
</html>
